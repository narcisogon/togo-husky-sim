site_name: lidarslam_ros2 Docs
site_description: ROS 2 LiDAR SLAM docs for pointcloud-map authoring, benchmarking, and Autoware-compatible workflows.
site_url: https://rsasaki0109.github.io/lidarslam_ros2/
repo_url: https://github.com/rsasaki0109/lidarslam_ros2
repo_name: rsasaki0109/lidarslam_ros2
docs_dir: docs
use_directory_urls: false
extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables

theme:
  name: material
  language: en
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: amber
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Autoware-Compatible Map Authoring: autoware-map-authoring.md
  - Autoware Quickstart: autoware-quickstart.md
  - Autoware Foxglove: autoware-foxglove.md
  - Operator Workflows: workflows.md
  - 3DGS Photoreal Map: 3dgs-map-tutorial.md
  - Benchmarking And Release Gate: benchmarking.md
  - DDS / Large-Message Tuning: dds-tuning.md
  - Comparison: comparison.md
  - Social:
      - v0.2.2 Post Kit: social/autoware_map_authoring_post_v0.2.2.md
  - Releases:
      - v0.3.0: releases/v0.3.0.md
      - v0.2.2: releases/v0.2.2.md
      - v0.2.1: releases/v0.2.1.md
      - v0.2.0: releases/v0.2.0.md
  - Research:
      - Triangle Stack (2026-05): research/triangle-stack-2026-05-summary.md
