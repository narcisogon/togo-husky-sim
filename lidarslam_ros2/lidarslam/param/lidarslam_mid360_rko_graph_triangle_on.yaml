graph_based_slam:
  ros__parameters:
    registration_method: "NDT"
    ndt_resolution: 5.0
    ndt_num_threads: 0
    voxel_leaf_size: 0.2

    loop_detection_period: 1000
    threshold_loop_closure_score: 15.0
    scan_context_loop_closure_score_threshold: -1.0
    distance_loop_closure: 100.0
    range_of_searching_loop_closure: 50.0
    search_submap_num: 5
    submap_distance_threshold: 1.5
    num_adjacent_pose_cnstraints: 5

    max_loop_candidate_count: 3
    loop_edge_dedup_index_window: 20
    loop_max_translation_delta: 15.0
    loop_max_rotation_delta_deg: 45.0
    loop_max_translation_delta_descriptor: -1.0
    loop_max_rotation_delta_deg_descriptor: -1.0
    adjacent_edge_info_weight: 1000.0
    loop_edge_info_weight: 200.0
    loop_edge_robust_kernel_delta: 1.0

    use_scan_context: false
    scan_context_threshold: 0.45
    use_bev_descriptor: false
    bev_descriptor_threshold: 0.20
    bev_descriptor_grid_size_m: 80.0
    bev_descriptor_grid_cells: 40
    bev_descriptor_yaw_bins: 24
    bev_descriptor_sequence_window: 0
    bev_descriptor_sequence_threshold: -1.0
    bev_descriptor_pose_consistency_threshold_m: -1.0
    bev_descriptor_max_euclidean_distance_m: -1.0
    bev_descriptor_rerank_weight_m: 100.0
    use_solid_descriptor: false
    solid_descriptor_min_similarity: 0.70
    solid_descriptor_sequence_window: 0
    solid_descriptor_sequence_min_similarity: -1.0
    solid_descriptor_pose_consistency_threshold_m: -1.0
    solid_descriptor_max_euclidean_distance_m: -1.0
    # Triangle descriptor ON. edge_3d keypoint mode is the MID-360 tuned
    # extractor (PCA on radius-r neighborhoods, geometrically equivalent
    # to LOAM edge points but view-direction agnostic). Provides a 3-point
    # RANSAC SE(3) initial guess to NDT, intended to drive NDT fitness
    # below the strict threshold_loop_closure_score=15.0 even on narrow
    # FOV MID-360 revisits where pure-distance candidates fail (fitness
    # 33-93 in the 2026-05-22 sweep).
    use_triangle_descriptor: true
    triangle_descriptor_keypoint_mode: "edge_3d"
    triangle_descriptor_grid_size_m: 60.0
    triangle_descriptor_grid_cells: 100
    triangle_descriptor_max_keypoints: 30
    triangle_descriptor_min_salience_m: 1.0
    triangle_descriptor_edge_voxel_size_m: 0.3
    triangle_descriptor_edge_neighbor_radius_m: 0.8
    triangle_descriptor_edge_min_neighbors: 6
    triangle_descriptor_edge_min_edgeness: 0.5
    triangle_descriptor_edge_nms_radius_m: 1.5
    triangle_descriptor_min_edge_m: 2.0
    triangle_descriptor_max_edge_m: 30.0
    triangle_descriptor_max_triangles: 2000
    triangle_descriptor_edge_bin_m: 0.5
    triangle_descriptor_quad_feature_bin_m: 0.0
    triangle_descriptor_min_votes: 8
    triangle_descriptor_min_inliers: 5
    triangle_descriptor_min_inlier_ratio: 0.0
    triangle_descriptor_max_pairs: 32
    triangle_descriptor_min_4th_point_agreements: 0
    triangle_descriptor_fourth_point_max_distance_m: 1.5
    triangle_descriptor_refine_se3_with_all_inliers: false
    # MID-360 narrow-FOV ablation (2026-05-22): with default
    # inlier_translation_m=2.0, every revisit triangle pair shows
    # inliers=1-2 / max_pairs=32 (3-6% ratio) and gets rejected by
    # min_inliers=5. Keypoint positions drift ~3-5m between revisits
    # due to angular geometry. Relax to 5.0m so RANSAC can count
    # geometrically-close-enough matches as inliers.
    triangle_descriptor_inlier_translation_m: 5.0
    triangle_descriptor_inlier_rotation_deg: 5.0
    triangle_descriptor_exclude_recent: 6
    triangle_verify_with_bev: false
    triangle_verify_bev_max_distance: 0.30
    prefer_scan_context_candidates: false
    use_3d_bbs_for_scan_context: false
    three_d_bbs_min_level_res: 1.0
    three_d_bbs_max_level: 2
    three_d_bbs_score_threshold_percentage: 0.25
    three_d_bbs_timeout_msec: 250
    three_d_bbs_num_threads: 1
    three_d_bbs_voxel_leaf_size: 2.0
    three_d_bbs_source_submap_num: 2
    three_d_bbs_target_submap_radius: 1
    three_d_bbs_translation_search_margin_m: 5.0
    three_d_bbs_roll_pitch_search_deg: 5.0
    three_d_bbs_yaw_search_deg: 60.0
    use_dynamic_object_filter: false
    dynamic_object_filter_voxel_size: 0.3
    dynamic_object_filter_min_observations: 2
    dynamic_object_filter_temporal_window: 5
    dynamic_object_filter_max_range_from_sensor_m: 30.0
    use_pcd_cache: true
    use_save_map_in_loop: true
    debug_flag: true
