a300_0000:
  controller_manager:
    ros__parameters:
      update_rate: 50
      use_sim_time: True
      joint_state_broadcaster.type: 'joint_state_broadcaster/JointStateBroadcaster'
      platform_velocity_controller.type: 'diff_drive_controller/DiffDriveController'
  platform_velocity_controller:
    ros__parameters:
      use_sim_time: True
      left_wheel_names: ['front_left_wheel_joint', 'rear_left_wheel_joint']
      right_wheel_names: ['front_right_wheel_joint', 'rear_right_wheel_joint']
      wheel_separation: 0.562
      wheels_per_side: 2
      wheel_radius: 0.1625
      wheel_separation_multiplier: 1.75
      left_wheel_radius_multiplier: 1.0
      right_wheel_radius_multiplier: 1.0
      publish_rate: 50.0
      odom_frame_id: 'odom'
      base_frame_id: 'base_link'
      pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
      twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
      open_loop: False
      enable_odom_tf: False
      tf_frame_prefix_enable: False
      cmd_vel_timeout: 0.5
      velocity_rolling_window_size: 5
      preserve_turning_radius: True
      publish_limited_velocity: True
      publish_wheel_data: True
      linear.x.has_velocity_limits: True
      linear.x.has_acceleration_limits: True
      linear.x.has_jerk_limits: False
      linear.x.max_velocity: 2.0
      linear.x.min_velocity: -2.0
      linear.x.max_acceleration: 2.0
      linear.x.max_deceleration: -4.0
      linear.x.max_acceleration_reverse: -2.0
      linear.x.max_deceleration_reverse: 4.0
      linear.x.max_jerk: 0.0
      linear.x.min_jerk: 0.0
      angular.z.has_velocity_limits: True
      angular.z.has_acceleration_limits: True
      angular.z.has_jerk_limits: False
      angular.z.max_velocity: 2.0
      angular.z.min_velocity: -2.0
      angular.z.max_acceleration: 4.0
      angular.z.max_deceleration: -4.0
      angular.z.max_acceleration_reverse: -4.0
      angular.z.max_deceleration_reverse: 4.0
      angular.z.max_jerk: 0.0
      angular.z.min_jerk: 0.0
  lynx_control:
    ros__parameters:
      feedback_hz: 50
      status_hz: 20
      debug_hz: 20
      can_bus: 'vcan0'
      joint_names: ['rear_left_wheel_joint', 'front_left_wheel_joint', 'front_right_wheel_joint', 'rear_right_wheel_joint']
      joint_can_ids: [101, 102, 103, 104]
      joint_directions: [1, 1, -1, -1]
      use_sim_time: True
