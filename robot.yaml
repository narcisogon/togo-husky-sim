serial_number: a300-0000
version: 0
system:
  hosts:
    - hostname: a300-0000
      ip: 127.0.0.1
  ros2:
    namespace: a300_0000
    workspaces:
      - /mnt/c/Users/Username/OneDrive/Desktop/husky/custom_ws/install/togo_setup.bash

platform:
  extras:
    urdf:
      path: /mnt/c/Users/Username/OneDrive/Desktop/husky/custom_ws/src/togo_custom/togo_description/urdf/togo_description.urdf.xacro
    launch:
      - path: /mnt/c/Users/Username/OneDrive/Desktop/husky/custom_ws/src/togo_custom/togo_bringup/launch/togo_bringup.launch.py
  enable_ekf: true
  controller: ps4
  attachments:
    - name: front_bumper
      type: a300.bumper
      parent: front_bumper_mount
    - name: rear_bumper
      type: a300.bumper
      parent: rear_bumper_mount
    - name: top_plate
      type: a300.top_plate

# Keep the sim intentionally simple and deterministic:
# rover + one custom Seyond Robin W-style GPU LiDAR + one co-located IMU.
# The custom sensors are defined in custom_ws/src/togo_custom/togo_description.
sensors: {}
