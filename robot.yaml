serial_number: a300-0000
version: 0
system:
  hosts:
    - hostname: a300-0000
      ip: 127.0.0.1
  ros2:
    namespace: a300_0000
    workspaces:
      - /mnt/c/Users/Username/OneDrive/Desktop/husky/custom_ws/install/togo_setup.bash

platform:
  extras:
    urdf:
      path: /mnt/c/Users/Username/OneDrive/Desktop/husky/custom_ws/src/togo_custom/togo_description/urdf/togo_description.urdf.xacro
    launch:
      - path: /mnt/c/Users/Username/OneDrive/Desktop/husky/custom_ws/src/togo_custom/togo_bringup/launch/togo_bringup.launch.py
  enable_ekf: true
  controller: ps4
  attachments:
    - name: front_bumper
      type: a300.bumper
      parent: front_bumper_mount
    - name: rear_bumper
      type: a300.bumper
      parent: rear_bumper_mount
    - name: top_plate
      type: a300.top_plate

sensors:
  imu:
    - model: phidgets_spatial
      urdf_enabled: true
      launch_enabled: true
      parent: base_link
      xyz: [0.059, 0.0, 0.161275]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        phidgets_spatial:
          data_interval_ms: 20
  lidar2d:
    - model: hokuyo_ust
      urdf_enabled: true
      launch_enabled: true
      parent: default_mount
  lidar3d:
    - model: ouster_os1
      urdf_enabled: true
      launch_enabled: true
      parent: default_mount
      xyz: [0.0, 0.0, 0.15]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        ouster_driver:
          sensor_hostname: 192.168.131.20
          udp_dest: 192.168.131.100
          lidar_port: 7502
          imu_port: 7503
          proc_mask: IMU|PCL|SCAN|IMG|RAW|TLM
          use_system_default_qos: false
          cap_type: halo
          base_type: base


